<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | Your Name</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* All your Sidebar and Main CSS from before goes here */
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; }
        header { 
            width: 300px; height: 100vh; position: fixed; 
            background: #2c3e50; color: white; padding: 40px 20px; 
            text-align: center; display: flex; flex-direction: column; 
        }
        main { margin-left: 300px; padding: 40px 60px; width: 100%; }
        .profile-photo { width: 120px; border-radius: 50%; margin-bottom: 20px; }
        nav a { color: #3498db; display: block; margin: 10px 0; text-decoration: none; }
        
        @media (max-width: 768px) {
            body { flex-direction: column; }
            header { position: relative; width: 100%; height: auto; }
            main { margin-left: 0; }
        }
    </style>
</head>
<body>
    <header>
        <img src="{{ site.baseurl }}/images/profile.jpg" class="profile-photo">
        <h1>Your Name</h1>
        <nav>
            <a href="{{ site.baseurl }}/">Home</a>
            <a href="{{ site.baseurl }}/projects">Projects</a>
        </nav>
    </header>

    <main>
        {{ content }}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
